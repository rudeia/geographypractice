<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>세계시민과 지리 - 빈칸 학습</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<header class="topbar">
  <h1>세계시민과 지리 <span class="sub">빈칸 학습</span></h1>
  <nav class="tabs">
    <button class="tab active" data-tab="study">학습 모드</button>
    <button class="tab" data-tab="timeattack">타임어택</button>
  </nav>
</header>

<main>
  <!-- 학습 모드 -->
  <section id="study" class="tab-panel active">
    <div class="controls">
      <label>단원
        <select id="unit-select"></select>
      </label>
      <label>빈칸 수
        <input id="blank-count" type="number" min="1" max="50" value="10">
      </label>
      <button id="reload-btn" class="btn primary">새 문제</button>
      <button id="check-btn" class="btn">입력 확인</button>
      <button id="reveal-btn" class="btn ghost">정답 보기</button>
    </div>
    <div id="study-area" class="worksheet"></div>
    <div id="study-summary" class="summary"></div>
  </section>

  <!-- 타임어택 -->
  <section id="timeattack" class="tab-panel">
    <div class="controls">
      <label>단원
        <select id="ta-unit-select"></select>
      </label>
      <label>시간(초)
        <input id="ta-time" type="number" min="10" max="600" value="60">
      </label>
      <button id="ta-start" class="btn primary">시작</button>
      <button id="ta-stop" class="btn ghost" disabled>종료</button>
    </div>
    <div class="ta-status">
      <div class="ta-stat"><span class="label">점수</span><strong id="ta-score">0</strong></div>
      <div class="ta-stat"><span class="label">남은 시간</span><strong id="ta-timer">--</strong></div>
      <div class="ta-stat"><span class="label">정답/오답</span><strong id="ta-count">0 / 0</strong></div>
    </div>
    <div id="ta-flash" class="flash"></div>
    <div id="ta-area" class="worksheet ta"></div>
    <div id="ta-history" class="history"></div>
  </section>
</main>

<footer class="foot">v7 · 개념어 중심 빈칸 · 블랙리스트/합성어 규칙 반영</footer>
<script src="js/app.js"></script>
</body>
</html>
