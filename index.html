<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>세계시민과 지리 학습지</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="brand">
      <span class="brand-globe" aria-hidden="true">🌏</span>
      <div class="brand-text">
        <h1>세계시민과 지리</h1>
        <p class="brand-sub">World Citizenship &amp; Geography · 학습지</p>
      </div>
    </div>
    <nav class="tabs" role="tablist">
      <button class="tab active" data-tab="study" role="tab">
        <span class="tab-icon">📖</span><span class="tab-label">학습</span>
      </button>
      <button class="tab" data-tab="random" role="tab">
        <span class="tab-icon">🎲</span><span class="tab-label">랜덤 학습</span>
      </button>
      <button class="tab" data-tab="attack" role="tab">
        <span class="tab-icon">⏱️</span><span class="tab-label">타임어택</span>
      </button>
    </nav>
  </header>

  <section class="panel" id="panel-study">
    <div class="controls">
      <label>중단원
        <select id="study-middle"></select>
      </label>
      <label>소단원
        <select id="study-sub"></select>
      </label>
      <label>세부내용
        <select id="study-detail"></select>
      </label>
      <div class="nav-btns">
        <button id="study-prev" class="btn btn-compact">◀ 이전</button>
        <button id="study-next" class="btn btn-compact">다음 ▶</button>
        <button id="study-check" class="btn btn-compact btn-primary">확인</button>
        <button id="study-reveal" class="btn btn-compact btn-ghost">정답</button>
      </div>
    </div>
    <div id="study-board" class="board"></div>
  </section>

  <section class="panel hidden" id="panel-random">
    <div class="controls">
      <label>중단원
        <select id="random-middle"></select>
      </label>
      <label>문항 수
        <input type="number" id="random-count" value="5" min="1" max="30">
      </label>
      <div class="nav-btns">
        <button id="random-start" class="btn btn-compact btn-primary">시작</button>
        <button id="random-reset" class="btn btn-compact btn-ghost">초기화</button>
      </div>
    </div>
    <div id="random-board" class="board"></div>
    <div id="random-result" class="board hidden"></div>
  </section>

  <section class="panel hidden" id="panel-attack">
    <div class="controls">
      <label>중단원
        <select id="attack-middle"><option value="ALL">전체</option></select>
      </label>
      <label>시간(초)
        <input type="number" id="attack-time" value="60" min="10" max="600">
      </label>
      <div class="nav-btns">
        <button id="attack-start" class="btn btn-compact btn-primary">시작</button>
        <button id="attack-reset" class="btn btn-compact btn-ghost">초기화</button>
      </div>
      <div class="attack-status">
        <span class="status-chip status-time">⏱ <span id="attack-timer">60</span>s</span>
        <span class="status-chip status-score">⭐ <span id="attack-score">0</span></span>
      </div>
    </div>
    <div id="attack-board" class="board"></div>
    <div id="attack-result" class="board hidden"></div>
    <div id="attack-flash" class="flash hidden"></div>
  </section>
</div>
<div class="watermark">제작 : 안좌고등학교 사회과</div>
<script src="js/app.js"></script>
</body>
</html>
