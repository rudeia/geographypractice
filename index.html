<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>세계시민과 지리 - 빈칸 학습지</title>
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
<header class="site-header">
  <h1>세계시민과 지리 · 빈칸 학습지</h1>
  <nav class="tabs">
    <button class="tab active" data-tab="learn">학습 모드</button>
    <button class="tab" data-tab="timeattack">타임어택</button>
  </nav>
</header>

<main>
  <!-- ===== 학습 모드 ===== -->
  <section id="panel-learn" class="panel active">
    <div class="toolbar">
      <label>
        단원
        <select id="unit-select"></select>
      </label>
      <label>
        한 페이지당 빈칸 수
        <input id="blanks-per-page" type="number" min="3" max="40" value="10" />
      </label>
      <button id="reload-btn" class="btn-primary">단원 시작</button>
    </div>

    <div id="page-meta" class="page-meta"></div>

    <article id="worksheet" class="worksheet"></article>

    <div class="action-bar">
      <button id="prev-btn" class="btn">◀ 이전</button>
      <button id="check-btn" class="btn-primary">입력 확인</button>
      <button id="reveal-btn" class="btn">정답 보기</button>
      <button id="next-btn" class="btn">다음 ▶</button>
    </div>
    <div id="check-result" class="check-result"></div>
  </section>

  <!-- ===== 타임어택 ===== -->
  <section id="panel-timeattack" class="panel">
    <div class="toolbar">
      <label>
        단원
        <select id="ta-unit-select"></select>
      </label>
      <label>
        제한 시간(초)
        <input id="ta-time" type="number" min="30" max="1800" value="180" />
      </label>
      <button id="ta-start" class="btn-primary">시작</button>
    </div>

    <div id="ta-status" class="ta-status hidden">
      <div class="ta-timer">⏱ <span id="ta-remaining">180</span>s</div>
      <div class="ta-score">점수: <span id="ta-score">0</span></div>
      <div class="ta-progress">문항 <span id="ta-idx">0</span>/<span id="ta-total">0</span></div>
    </div>

    <article id="ta-block" class="worksheet ta-block hidden"></article>
    <div id="ta-flash" class="ta-flash"></div>
    <div id="ta-actions" class="action-bar hidden">
      <button id="ta-submit" class="btn-primary">확인 (Enter)</button>
      <button id="ta-skip" class="btn">넘기기</button>
    </div>

    <div id="ta-result" class="ta-result hidden">
      <h2>결과</h2>
      <div class="result-summary">
        최종 점수: <strong id="ta-final-score">0</strong> ·
        정답: <strong id="ta-final-correct">0</strong> ·
        오답: <strong id="ta-final-wrong">0</strong>
      </div>
      <h3>풀이 기록 (오답 정리)</h3>
      <div id="ta-history" class="ta-history"></div>
      <button id="ta-restart" class="btn-primary">다시 시작</button>
    </div>
  </section>
</main>

<script src="js/app.js"></script>
</body>
</html>
