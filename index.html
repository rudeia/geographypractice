<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>세계시민과 지리 빈칸 학습</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<header class="topbar">
  <h1>세계시민과 지리 · 빈칸 학습</h1>
  <nav class="tabs">
    <button class="tab active" data-tab="study">학습</button>
    <button class="tab" data-tab="timeattack">타임어택</button>
  </nav>
</header>

<main id="studyTab" class="tab-content active">
  <div class="controls">
    <label>대단원
      <select id="unitSel"></select>
    </label>
    <label>중단원
      <select id="chapSel"></select>
    </label>
    <label>소단원
      <select id="pageSel"></select>
    </label>
    <button id="prevBtn">◀ 이전</button>
    <button id="nextBtn">다음 ▶</button>
    <button id="checkBtn" class="primary">입력 확인</button>
    <button id="revealBtn">정답 보기</button>
  </div>
  <div id="studyArea" class="sheet"></div>
  <div id="studyResult" class="result"></div>
</main>

<main id="timeattackTab" class="tab-content">
  <div class="controls">
    <label>시간(초)
      <input type="number" id="timeSec" value="60" min="10" max="600">
    </label>
    <label>대단원
      <select id="taUnitSel">
        <option value="all">전체</option>
      </select>
    </label>
    <button id="taStartBtn" class="primary">시작</button>
  </div>
  <div class="ta-status">
    <span>남은 시간: <b id="taTime">-</b>초</span>
    <span>점수: <b id="taScore">0</b></span>
  </div>
  <div id="taArea" class="sheet"></div>
  <div id="taFeedback" class="ta-feedback"></div>
  <div id="taReview" class="ta-review"></div>
</main>

<div class="watermark">제작 : 안좌고등학교 사회과</div>

<script src="js/app.js"></script>
</body>
</html>
