<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>세계시민과 지리 빈칸 학습지</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<header class="topbar">
  <h1>세계시민과 지리 · 빈칸 학습지</h1>
  <nav class="tabs">
    <button class="tab active" data-tab="study">학습 모드</button>
    <button class="tab" data-tab="time">타임어택</button>
  </nav>
</header>

<main>
  <section id="tab-study" class="pane active">
    <div class="controls">
      <label>대단원
        <select id="unit-select"></select>
      </label>
      <label>중단원
        <select id="middle-select"></select>
      </label>
      <label>소단원
        <select id="sub-select"></select>
      </label>
      <div class="nav-btns">
        <button id="prev-sub">◀ 이전</button>
        <button id="next-sub">다음 ▶</button>
      </div>
      <button id="check-btn" class="primary">입력 확인</button>
      <button id="reveal-btn">정답 보기</button>
      <span id="score-summary" class="summary"></span>
    </div>
    <article id="board" class="board"></article>
  </section>

  <section id="tab-time" class="pane">
    <div class="controls time-controls">
      <label>시간(초)
        <input type="number" id="time-input" value="60" min="10" max="600" step="10">
      </label>
      <label>대단원
        <select id="time-unit-select"></select>
      </label>
      <button id="start-btn" class="primary">시작</button>
      <span class="stat">남은 시간: <b id="time-left">-</b>초</span>
      <span class="stat">점수: <b id="score">0</b></span>
    </div>
    <article id="time-board" class="board"></article>
    <div id="time-flash" class="flash"></div>
    <div id="time-result" class="result"></div>
  </section>
</main>

<footer class="watermark">제작 : 안좌고등학교 사회과</footer>

<script src="js/app.js"></script>
</body>
</html>
